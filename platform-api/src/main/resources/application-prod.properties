# ============================================================
# Profile: prod — PostgreSQL
# ============================================================
# Запуск: SPRING_PROFILES_ACTIVE=prod
# Переменные: DATABASE_URL, DATABASE_USERNAME, DATABASE_PASSWORD
# ============================================================

spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/platformdb}
spring.datasource.username=${DATABASE_USERNAME:platform}
spring.datasource.password=${DATABASE_PASSWORD:platform}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000

# JPA
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false
