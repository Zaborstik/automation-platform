# Spring Boot Application Configuration
spring.application.name=platform-api

# Default profile: dev (H2, local). Override with SPRING_PROFILES_ACTIVE=prod for PostgreSQL.
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# Server
server.port=8080
server.servlet.context-path=/

# Logging
logging.level.com.zaborstik=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG

spring.output.ansi.enabled=always

# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null

# JPA (datasource and dialect come from profile: dev=H2, prod=PostgreSQL)
spring.jpa.open-in-view=false

# Browser executor / Playwright agent
platform.agent.server-url=${PLATFORM_AGENT_SERVER_URL:http://localhost:3000}
platform.agent.base-url=${PLATFORM_AGENT_BASE_URL:http://localhost:8080}
platform.agent.headless=${PLATFORM_AGENT_HEADLESS:false}

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
