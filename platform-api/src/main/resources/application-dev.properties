# ============================================================
# Profile: dev — локальная разработка и тесты без PostgreSQL
# ============================================================
# Запуск: без переменных или SPRING_PROFILES_ACTIVE=dev
# БД: H2 in-memory (таблицы создаются Flyway из db/migration)
# ============================================================

# H2: in-memory, режим совместимости с PostgreSQL (тот же SQL что и в prod)
spring.datasource.url=jdbc:h2:mem:platformdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;DATABASE_TO_UPPER=FALSE;MODE=PostgreSQL;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Flyway — те же миграции, что и для PostgreSQL
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false

# H2 Console (для отладки: http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
