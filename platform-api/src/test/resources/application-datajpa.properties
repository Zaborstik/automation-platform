# DataJpaTest slice: H2 with schemas created by spring.sql.init (datajpa-init.sql).
# @AutoConfigureTestDatabase(replace = NONE) so this URL is used.
# H2 resolves unquoted schema names to uppercase; datajpa-init.sql creates "ZBRTSTK" and "SYSTEM".
spring.datasource.url=jdbc:h2:mem:platformdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL;DEFAULT_NULL_ORDERING=HIGH
spring.jpa.hibernate.ddl-auto=create-drop
spring.flyway.enabled=false
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:datajpa-init.sql
